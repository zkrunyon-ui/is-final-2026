<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13315C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c6a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)" />
  <!-- Subtle pattern -->
  <circle cx="350" cy="50" r="120" fill="none" stroke="#C8A951" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="350" cy="50" r="80" fill="none" stroke="#C8A951" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Shoulders / body -->
  <ellipse cx="200" cy="520" rx="130" ry="90" fill="#1A2A4A" />
  <!-- Neck -->
  <rect x="180" y="330" width="40" height="60" rx="10" fill="url(#skin)" />
  <!-- Head -->
  <ellipse cx="200" cy="260" rx="80" ry="90" fill="url(#skin)" />
  <!-- Hair -->
  <ellipse cx="200" cy="185" rx="80" ry="40" fill="#3D2B1F" />
  <rect x="120" y="185" width="20" height="60" rx="10" fill="#3D2B1F" />
  <rect x="260" y="185" width="20" height="60" rx="10" fill="#3D2B1F" />
  <!-- Eyes -->
  <ellipse cx="170" cy="265" rx="12" ry="10" fill="white" />
  <ellipse cx="230" cy="265" rx="12" ry="10" fill="white" />
  <circle cx="172" cy="266" r="7" fill="#2A1A0E" />
  <circle cx="232" cy="266" r="7" fill="#2A1A0E" />
  <circle cx="174" cy="263" r="2" fill="white" />
  <circle cx="234" cy="263" r="2" fill="white" />
  <!-- Eyebrows -->
  <path d="M155,252 Q170,244 185,250" stroke="#3D2B1F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M215,250 Q230,244 245,252" stroke="#3D2B1F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M196,275 Q192,295 185,305 Q200,312 215,305 Q208,295 204,275" fill="#d4956a" fill-opacity="0.4"/>
  <!-- Mouth / smile -->
  <path d="M178,322 Q200,338 222,322" stroke="#c07a55" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Gold accent -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C8A951" opacity="0.8">Z. K. Runyon</text>
  <!-- TODO label -->
  <text x="200" y="485" text-anchor="middle" font-family="monospace" font-size="10" fill="white" opacity="0.4">replace with real headshot</text>
</svg>
