<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#aad4f5"/>
      <stop offset="100%" style="stop-color:#d6eaf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Mountains -->
  <polygon points="0,500 200,180 400,500" fill="#1a5276" opacity="0.7"/>
  <polygon points="150,500 380,120 600,500" fill="#0b2545" opacity="0.85"/>
  <polygon points="350,500 580,200 800,500" fill="#1a5276" opacity="0.7"/>
  <!-- Snow caps -->
  <polygon points="380,120 360,180 400,175" fill="white" opacity="0.9"/>
  <polygon points="200,180 180,240 220,235" fill="white" opacity="0.85"/>
  <polygon points="580,200 560,255 600,250" fill="white" opacity="0.85"/>
  <!-- Pine silhouettes -->
  <polygon points="60,500 75,430 90,500" fill="#1e4d2b"/>
  <polygon points="65,445 75,400 85,445" fill="#1e4d2b"/>
  <polygon points="700,500 715,435 730,500" fill="#1e4d2b"/>
  <polygon points="705,448 715,408 725,448" fill="#1e4d2b"/>
  <!-- Label -->
  <text x="400" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="white" opacity="0.6">Resort Photo</text>
  <text x="400" y="308" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="white" opacity="0.45">(image unavailable)</text>
</svg>
