<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Powder Run — Snowboarding Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e27;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: monospace;
      color: #fff;
      overflow: hidden;
    }
    #back-link {
      position: fixed;
      top: 10px;
      left: 14px;
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      text-decoration: none;
      z-index: 100;
      letter-spacing: 0.04em;
    }
    #back-link:hover { color: #c8a951; }
    #canvas-wrap {
      position: relative;
      margin-top: 36px;
      width: min(100vw, 177.78vh);
      max-width: 960px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
    }
    #controls-help {
      margin-top: 10px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.38);
      text-align: center;
      letter-spacing: 0.05em;
      padding: 0 1rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<a id="back-link" href="scratch.html">&#8592; Back</a>
<div id="canvas-wrap">
  <canvas id="gc" width="320" height="180"></canvas>
</div>
<div id="controls-help">
  SPACE / TAP = Jump &nbsp;|&nbsp; &larr;&rarr; = Spin (180 / 360 / 540…) &nbsp;|&nbsp;
  &uarr; = Grab &nbsp;|&nbsp; &darr; = Method &nbsp;|&nbsp; R = Retry &nbsp;|&nbsp; M = Mute
  <br>Release tricks BEFORE you land or you wipe out!
</div>

<script>
// ================================================================
// POWDER RUN — complete rewrite
// Downhill pixel-art snowboarding · Zach Runyon · BYU IS
// ================================================================

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const W = 320, H = 180;

// ================================================================
// --- CONSTANTS ---
// ================================================================
const GRAVITY    = 0.26;
const LS_KEY     = 'zkrunyon_snowboard_highscore';
const FIXED_DT   = 1 / 60;
const SPIN_SPEED = 4.8;          // degrees/frame while holding arrow
const SPIN_WINDOW = 38;          // degrees from 180-multiple = clean landing
const TREE_SAFE_START = 420;     // no trees until this world-X

// ================================================================
// --- STATIC BACKGROUND (pre-rendered once, blitted every frame) ---
// ================================================================
const staticBg = document.createElement('canvas');
staticBg.width = W; staticBg.height = H;
const sbg = staticBg.getContext('2d');

(function buildStaticBg() {
  // Sky gradient
  const grad = sbg.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#060914');
  grad.addColorStop(0.5, '#0a1628');
  grad.addColorStop(1,   '#0f2240');
  sbg.fillStyle = grad;
  sbg.fillRect(0, 0, W, H);

  // Stars — golden-ratio distribution, no random() so it's deterministic
  for (let i = 0; i < 64; i++) {
    const sx = (i * 137.508 * 1.7) % W | 0;
    const sy = (i * 97.31  * 1.3) % (H * 0.72) | 0;
    const bright = 0.35 + (i % 5) * 0.12;
    sbg.fillStyle = `rgba(255,255,255,${bright})`;
    sbg.fillRect(sx, sy, i % 7 === 0 ? 2 : 1, i % 7 === 0 ? 2 : 1);
  }

  // Moon
  sbg.fillStyle = 'rgba(255,253,231,0.07)';
  sbg.beginPath(); sbg.arc(W - 24, 19, 13, 0, Math.PI * 2); sbg.fill();
  sbg.fillStyle = '#fffde7';
  sbg.beginPath(); sbg.arc(W - 24, 19, 7, 0, Math.PI * 2);  sbg.fill();
})();

// ================================================================
// --- AUDIO ---
// ================================================================
let audioCtx = null, muted = false, musicStarted = false, musicTimer = null, musicBeat = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, type, dur, vol, delay) {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol || 0.14, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur + 0.01);
}

function sfxJump()  { playTone(330,'square',0.08,0.11); playTone(440,'square',0.06,0.09,0.05); }
function sfxTrick() { [523,659,784,1047].forEach((f,i)=>playTone(f,'square',0.07,0.12,i*0.04)); }
function sfxLand()  { playTone(220,'triangle',0.1,0.16); }
function sfxCrash() { playTone(180,'sawtooth',0.05,0.2); playTone(100,'sawtooth',0.2,0.18,0.05); playTone(60,'sawtooth',0.3,0.14,0.12); }
function sfxCombo() { [784,988,1175,1568].forEach((f,i)=>playTone(f,'triangle',0.06,0.14,i*0.04)); }

const NOTES = [196,220,196,165, 175,196,175,147, 165,196,220,196, 175,165,147,131];
function startMusic() {
  if (!audioCtx || musicStarted) return;
  musicStarted = true;
  scheduleBeat();
}
function scheduleBeat() {
  if (!audioCtx) return;
  const bpm = 160, bl = 60 / bpm;
  const note = NOTES[musicBeat % NOTES.length];
  if (!muted) {
    playTone(note,     'square',   bl * 0.5,  0.07);
    playTone(note * 2, 'triangle', bl * 0.25, 0.04);
    if (musicBeat % 4 === 0) playTone(55, 'square', bl * 0.4, 0.06);
    if (musicBeat % 4 === 2) playTone(73, 'square', bl * 0.3, 0.05);
  }
  musicBeat++;
  musicTimer = setTimeout(scheduleBeat, bl * 1000);
}
function stopMusic() {
  if (musicTimer) clearTimeout(musicTimer);
  musicStarted = false; musicBeat = 0;
}
function toggleMute() {
  muted = !muted;
  if (muted) stopMusic();
  else if (gameState === 'playing') { musicStarted = false; startMusic(); }
}

// ================================================================
// --- TERRAIN ---
// ================================================================
let segments = []; // {x1,y1,x2,y2,isRamp}
let camX = 0, camY = 0;

function genSeg(x1, y1) {
  const r = Math.random();
  let dy, isRamp = false, w = 44 + (Math.random() * 22 | 0);
  if      (r < 0.08)  { dy = -(12 + Math.random() * 10); isRamp = true; w = 30 + (Math.random()*14|0); }
  else if (r < 0.18)  { dy =  2 + Math.random() * 5;  } // gentle
  else if (r < 0.42)  { dy =  7 + Math.random() * 9;  } // moderate
  else if (r < 0.62)  { dy = 12 + Math.random() * 12; } // steep
  else                { dy =  5 + Math.random() * 7;  } // default
  const y2 = y1 + dy;
  return { x1, y1, x2: x1 + w, y2, isRamp };
}

function initTerrain() {
  segments = [];
  let x = -80, y = 44;
  // flat start platform
  for (let i = 0; i < 6; i++) {
    segments.push({ x1: x, y1: y, x2: x + 52, y2: y, isRamp: false });
    x += 52;
  }
  // generate ahead
  while (x < W * 6) {
    const s = genSeg(x, y);
    segments.push(s);
    x = s.x2; y = s.y2;
  }
}

function maintainTerrain() {
  while (segments.length > 2 && segments[0].x2 < camX - 120) segments.shift();
  const last = segments[segments.length - 1];
  if (last && last.x2 < camX + W + 350) {
    const s = genSeg(last.x2, last.y2);
    segments.push(s);
  }
}

function groundAt(wx) {
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    if (wx >= s.x1 && wx <= s.x2) {
      const t = (wx - s.x1) / ((s.x2 - s.x1) || 1);
      return s.y1 + (s.y2 - s.y1) * t;
    }
  }
  const last = segments[segments.length - 1];
  return last ? last.y2 : H * 0.5;
}

function segmentAt(wx) {
  for (let i = 0; i < segments.length; i++) {
    if (wx >= segments[i].x1 && wx <= segments[i].x2) return segments[i];
  }
  return null;
}

// ================================================================
// --- TREES ---
// ================================================================
let trees = []; // {wx, baseY, height, type}

function spawnTrees(fromX, toX) {
  let x = fromX + 60 + Math.random() * 60;
  while (x < toX) {
    const seg = segmentAt(x);
    if (seg && !seg.isRamp) {
      trees.push({
        wx:     x,
        baseY:  groundAt(x),
        height: 13 + (Math.random() * 16 | 0),
        tall:   Math.random() > 0.4
      });
    }
    x += 100 + Math.random() * 80;
  }
}

function initTrees() {
  trees = [];
  spawnTrees(TREE_SAFE_START, W * 6);
}

function maintainTrees() {
  while (trees.length && trees[0].wx < camX - 80) trees.shift();
  const lastX = trees.length ? trees[trees.length - 1].wx : camX + W;
  if (lastX < camX + W + 450) spawnTrees(lastX + 80, lastX + 550);
}

// ================================================================
// --- PARALLAX MIDGROUND (pines, generated once) ---
// ================================================================
const PINES = Array.from({length: 38}, (_, i) => ({
  rx:    i * 190 + (i * 37) % 85,
  h:     15 + (i * 13) % 17,
  layer: i % 3   // 0=far 1=mid 2=near
}));
const PINE_PX   = [0.22, 0.42, 0.62];
const PINE_COL  = ['#09200f', '#0e2e15', '#1a4828'];
const PINE_WRAP = W + 240;

// ================================================================
// --- PLAYER ---
// ================================================================
const player = {
  wx: 100, wy: 44,
  vx: 1.6, vy: 0,
  onGround: false,
  angle: 0,
  spinAngle: 0,
  grabbing: false,
  method: false,
  airTime: 0,
  crashed: false,
};

function resetPlayer() {
  Object.assign(player, {
    wx:44+52*3, wy:44, vx:1.8, vy:0,
    onGround:false, angle:0, spinAngle:0,
    grabbing:false, method:false, airTime:0, crashed:false
  });
}

// Draw pixel-art rider
function drawRider(sx, sy, ang, grabbed, methoded, crashed) {
  ctx.save();
  ctx.translate(sx | 0, sy | 0);
  ctx.rotate(ang);

  const J='#1a6bbf', P='#0b2545', B='#2c1810', SK='#f5c6a0',
        H='#c8a951', G='#1a1a2e', GL='#7ec8e3', RD='#e74c3c', RE='#c0392b';

  if (crashed) {
    ctx.fillStyle=J; ctx.fillRect(-10,-3,20,5);
    ctx.fillStyle=SK;ctx.fillRect(-4,-12,6,6);
    ctx.fillStyle=H; ctx.fillRect(-5,-13,7,4);
    ctx.fillStyle=P; ctx.fillRect(-11,2,7,5); ctx.fillRect(3,2,7,5);
    ctx.fillStyle=RD;ctx.save();ctx.rotate(0.35);ctx.fillRect(-13,6,24,3);ctx.restore();
  } else if (grabbed) {
    ctx.fillStyle=RD;ctx.fillRect(-10,4,20,3);
    ctx.fillStyle=RE;ctx.fillRect(-10,4,1,3);ctx.fillRect(9,4,1,3);
    ctx.fillStyle=B; ctx.fillRect(-7,-1,4,6); ctx.fillRect(3,-1,4,6);
    ctx.fillStyle=P; ctx.fillRect(-6,-5,12,5);
    ctx.fillStyle=J; ctx.fillRect(-5,-10,9,6);
    ctx.fillStyle=SK;ctx.fillRect(-3,-15,6,6); ctx.fillRect(-1,1,3,4);
    ctx.fillStyle=H; ctx.fillRect(-3,-16,6,4);
    ctx.fillStyle=G; ctx.fillRect(-3,-14,6,3);
    ctx.fillStyle=GL;ctx.fillRect(-3,-14,3,2);ctx.fillRect(0,-14,3,2);
  } else if (methoded) {
    ctx.fillStyle=RD;ctx.save();ctx.rotate(-0.42);ctx.fillRect(-10,6,20,3);
    ctx.fillStyle=RE;ctx.fillRect(-10,6,1,3);ctx.fillRect(9,6,1,3);ctx.restore();
    ctx.fillStyle=B; ctx.fillRect(-8,0,4,6);  ctx.fillRect(3,-1,4,6);
    ctx.fillStyle=P; ctx.fillRect(-6,-5,12,5);
    ctx.fillStyle=J; ctx.fillRect(-5,-10,9,6);
    ctx.fillStyle=SK;ctx.fillRect(-3,-15,6,6);
    ctx.fillStyle=H; ctx.fillRect(-3,-16,6,4);
    ctx.fillStyle=G; ctx.fillRect(-3,-14,6,3);
    ctx.fillStyle=GL;ctx.fillRect(-3,-14,3,2);ctx.fillRect(0,-14,3,2);
  } else {
    ctx.fillStyle=RD;ctx.fillRect(-10,5,20,3);
    ctx.fillStyle=RE;ctx.fillRect(-10,5,1,3);ctx.fillRect(9,5,1,3);
    ctx.fillStyle=B; ctx.fillRect(-7,1,4,5);  ctx.fillRect(3,1,4,5);
    ctx.fillStyle=P; ctx.fillRect(-5,-4,10,6);
    ctx.fillStyle=J; ctx.fillRect(-4,-10,8,7);ctx.fillRect(-10,-8,5,3);ctx.fillRect(5,-8,5,3);
    ctx.fillStyle=SK;ctx.fillRect(-3,-15,6,6);
    ctx.fillStyle=H; ctx.fillRect(-3,-16,6,4);
    ctx.fillStyle=G; ctx.fillRect(-3,-14,6,3);
    ctx.fillStyle=GL;ctx.fillRect(-3,-14,3,2);ctx.fillRect(0,-14,3,2);
  }
  ctx.restore();
}

// ================================================================
// --- INPUT ---
// ================================================================
const keys = {};
let jumpPressed = false, spinLeft = false, spinRight = false,
    grabPressed = false, methodPressed = false;

document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  switch (e.code) {
    case 'Space':
      initAudio();
      if (audioCtx?.state === 'suspended') audioCtx.resume();
      if (gameState !== 'playing') { startGame(); return; }
      if (player.onGround) jumpPressed = true;
      e.preventDefault(); break;
    case 'ArrowLeft':  spinLeft      = true; e.preventDefault(); break;
    case 'ArrowRight': spinRight     = true; e.preventDefault(); break;
    case 'ArrowUp':    grabPressed   = true; e.preventDefault(); break;
    case 'ArrowDown':  methodPressed = true; e.preventDefault(); break;
    case 'KeyR': if (gameState === 'gameover') startGame(); break;
    case 'KeyM': toggleMute(); break;
  }
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ArrowLeft')  spinLeft      = false;
  if (e.code === 'ArrowRight') spinRight     = false;
  if (e.code === 'ArrowUp')    grabPressed   = false;
  if (e.code === 'ArrowDown')  methodPressed = false;
});

// Touch
let tx0 = 0, ty0 = 0;
canvas.addEventListener('pointerdown', e => {
  initAudio();
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  tx0 = e.clientX; ty0 = e.clientY;
  if (gameState !== 'playing') { startGame(); return; }
  if (player.onGround) jumpPressed = true;
});
canvas.addEventListener('pointermove', e => {
  if (gameState !== 'playing' || player.onGround) return;
  const dx = e.clientX - tx0, dy = e.clientY - ty0;
  if (Math.abs(dx) > 8) { spinLeft = dx < 0; spinRight = dx > 0; }
  if (Math.abs(dy) > 8) { grabPressed = dy < 0; methodPressed = dy > 0; }
});
canvas.addEventListener('pointerup', () => {
  spinLeft = spinRight = grabPressed = methodPressed = false;
});

// ================================================================
// --- SCORING ---
// ================================================================
let score      = 0;
let bestScore  = parseInt(localStorage.getItem(LS_KEY) || '0');
let comboCount = 0;     // consecutive clean landings
let airMult    = 1.0;   // multiplier built during this air
let spinScored = 0;     // # of 180° increments scored this air
let grabDone   = false;
let methodDone = false;
let pendingPts = 0;     // trick points to award on clean landing
let trickName  = '';
let trickFlash = 0;

const SPIN_PTS = [300, 800, 1500, 2500, 3800]; // per 180° increment

function resetAirState() {
  airMult = 1.0; spinScored = 0;
  grabDone = false; methodDone = false;
  pendingPts = 0; player.spinAngle = 0;
}

function doTrickScore(pts, name, newMult) {
  pendingPts += pts;
  if (newMult) airMult = Math.min(airMult + newMult, 5.0);
  trickName = name;
  trickFlash = 65;
  sfxTrick();
}

// Returns 'crash' or 'clean'
function checkLanding() {
  // Holding grab or method at touchdown = crash
  if (grabPressed || methodPressed) return 'crash';
  // Mid-spin check (only if they actually spun)
  if (Math.abs(player.spinAngle) > 70) {
    const nearest = Math.round(player.spinAngle / 180) * 180;
    if (Math.abs(player.spinAngle - nearest) > SPIN_WINDOW) return 'crash';
  }
  return 'clean';
}

function awardLanding() {
  if (pendingPts === 0 && spinScored === 0) return;
  const comboMult = 1 + comboCount * 0.3;
  const earned = Math.round(pendingPts * airMult * comboMult);
  score += earned;
  comboCount++;
  trickName = '+' + earned + (comboCount > 1 ? '  COMBO x' + comboCount : '');
  trickFlash = 100;
  sfxCombo();
}

// ================================================================
// --- GAME STATE ---
// ================================================================
let gameState  = 'title';
let frameCount = 0;

function startGame() {
  score = 0; comboCount = 0;
  trickName = ''; trickFlash = 0; frameCount = 0;
  camX = 0; camY = 0;
  resetPlayer(); resetAirState();
  initTerrain(); initTrees();
  stopMusic(); gameState = 'playing'; startMusic();
}

function doCrash() {
  player.crashed = true;
  gameState = 'gameover';
  sfxCrash();
  comboCount = 0;
  if (score > bestScore) { bestScore = score; localStorage.setItem(LS_KEY, bestScore); }
}

// ================================================================
// --- UPDATE ---
// ================================================================
let lastTime = null, accumulator = 0;

function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  const seg = segmentAt(player.wx);

  // --- Jump ---
  if (jumpPressed && player.onGround) {
    player.vy = -5.8;
    player.onGround = false;
    player.airTime = 0;
    resetAirState();
    sfxJump();
  }
  jumpPressed = false;

  // --- Physics + tricks in air ---
  if (!player.onGround) {
    player.airTime++;
    player.vy += GRAVITY;

    // Spin
    if (spinLeft)  player.spinAngle -= SPIN_SPEED;
    if (spinRight) player.spinAngle += SPIN_SPEED;

    // Score 180° increments as they complete
    const newCount = Math.floor(Math.abs(player.spinAngle) / 180);
    if (newCount > spinScored) {
      const idx = Math.min(spinScored, SPIN_PTS.length - 1);
      doTrickScore(SPIN_PTS[idx], (newCount * 180) + '!', 0);
      spinScored = newCount;
    }

    // Grab (one-shot per air)
    player.grabbing = grabPressed;
    if (grabPressed && !grabDone) {
      grabDone = true;
      doTrickScore(400, 'GRAB  +0.5x', 0.5);
    }

    // Method (one-shot per air)
    player.method = methodPressed;
    if (methodPressed && !methodDone) {
      methodDone = true;
      doTrickScore(600, 'METHOD  +1x', 1.0);
    }

  } else {
    // Ground: slope follow & accelerate downhill
    if (seg) {
      const slope = (seg.y2 - seg.y1) / ((seg.x2 - seg.x1) || 1);
      player.vx  = Math.max(1.6, Math.min(7.5, player.vx + slope * 0.85));
      player.angle = Math.atan2(seg.y2 - seg.y1, seg.x2 - seg.x1);
    }
    if (trickFlash > 0) trickFlash--;
  }

  player.wx += player.vx;
  player.wy += player.vy;

  // --- Ground collision ---
  const gy = groundAt(player.wx);
  if (player.wy >= gy - 8) {
    if (!player.onGround) {
      // Landing
      const result = checkLanding();
      if (result === 'crash') {
        player.wy = gy - 8;
        doCrash(); return;
      }
      awardLanding();
      sfxLand();
      player.onGround = true;
      player.wy = gy - 8;
      player.vy = 0;
      player.spinAngle = 0;
      player.grabbing = false;
      player.method   = false;
      if (seg) {
        const slope = (seg.y2 - seg.y1) / ((seg.x2 - seg.x1) || 1);
        player.vx = Math.max(2.2, player.vx + slope * 1.8);
      }
    } else {
      player.onGround = true;
      player.wy = gy - 8;
    }
  } else {
    if (player.onGround) {
      player.onGround = false;
      player.airTime = 0;
      resetAirState();
    }
  }

  // --- Tree collision ---
  for (let i = 0; i < trees.length; i++) {
    const t = trees[i];
    if (t.wx < player.wx - 24) continue;
    if (t.wx > player.wx + 24) break;
    const dx = Math.abs(player.wx - t.wx);
    if (dx < 7 && (player.wy - 10) > (t.baseY - t.height)) {
      doCrash(); return;
    }
  }

  // --- Distance score ---
  if (frameCount % 9 === 0) score += Math.ceil(player.vx * 0.6) | 0;

  // --- Camera: lerp toward player (both X and Y) ---
  camX += ((player.wx - W * 0.30) - camX) * 0.10;
  camY += ((player.wy - H * 0.52) - camY) * 0.07;

  maintainTerrain();
  maintainTrees();
}

// ================================================================
// --- RENDER ---
// ================================================================

function drawBackground() {
  // 1) Static sky — single fast blit
  ctx.drawImage(staticBg, 0, 0);

  // 2) Far mountain silhouettes (very slow parallax)
  const mfx = (-(camX * 0.05) % W + W) % W | 0;
  const mfy = (H * 0.46 - camY * 0.04) | 0;
  ctx.fillStyle = '#0c1d38';
  for (let p = -1; p <= 1; p++) {
    const ox = mfx + p * W;
    ctx.beginPath();
    ctx.moveTo(ox, H);
    ctx.lineTo(ox,       mfy);
    ctx.lineTo(ox + 55,  mfy - 34);
    ctx.lineTo(ox + 120, mfy - 14);
    ctx.lineTo(ox + 165, mfy - 52);
    ctx.lineTo(ox + 220, mfy - 22);
    ctx.lineTo(ox + 278, mfy - 42);
    ctx.lineTo(ox + W,   mfy);
    ctx.lineTo(ox + W, H);
    ctx.closePath();
    ctx.fill();
    // snow caps
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.moveTo(ox+165,mfy-52); ctx.lineTo(ox+148,mfy-34); ctx.lineTo(ox+182,mfy-34); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ox+278,mfy-42); ctx.lineTo(ox+264,mfy-27); ctx.lineTo(ox+292,mfy-27); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#0c1d38';
  }

  // 3) Near mountain silhouettes
  const mnx = (-(camX * 0.12) % W + W) % W | 0;
  const mny = (H * 0.54 - camY * 0.06) | 0;
  ctx.fillStyle = '#101f3c';
  for (let p = -1; p <= 1; p++) {
    const ox = mnx + p * W;
    ctx.beginPath();
    ctx.moveTo(ox, H);
    ctx.lineTo(ox,       mny + 8);
    ctx.lineTo(ox + 75,  mny - 24);
    ctx.lineTo(ox + 140, mny + 2);
    ctx.lineTo(ox + 195, mny - 32);
    ctx.lineTo(ox + 255, mny - 8);
    ctx.lineTo(ox + W,   mny + 8);
    ctx.lineTo(ox + W, H);
    ctx.closePath();
    ctx.fill();
  }

  // 4) Parallax pine trees (midground)
  PINES.forEach(pine => {
    const pf = PINE_PX[pine.layer];
    const sx = ((pine.rx - camX * pf) % PINE_WRAP + PINE_WRAP) % PINE_WRAP - 120 | 0;
    // Vertical: base sits at a fixed screen fraction, slight camY influence
    const sy = (H * 0.60 - camY * pf * 0.12 + pine.layer * 7) | 0;
    const h  = pine.h;
    ctx.fillStyle = PINE_COL[pine.layer];
    ctx.fillRect(sx - 1, sy, 2, 5); // trunk
    const tiers = pine.tall ? 3 : 2;
    for (let t = 0; t < tiers; t++) {
      const tw = Math.max(2, (h * 0.54 * (tiers - t) / tiers) | 0);
      const ty = (sy - h * t / tiers) | 0;
      const th = (h / tiers + 2) | 0;
      ctx.beginPath();
      ctx.moveTo(sx, ty);
      ctx.lineTo(sx - tw, ty + th);
      ctx.lineTo(sx + tw, ty + th);
      ctx.closePath();
      ctx.fill();
    }
  });
}

function drawTerrain() {
  // Snow fill
  ctx.beginPath();
  const f = segments[0];
  ctx.moveTo((f.x1 - camX) | 0, H + 10);
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    ctx.lineTo((s.x1 - camX) | 0, (s.y1 - camY) | 0);
  }
  const l = segments[segments.length - 1];
  ctx.lineTo((l.x2 - camX) | 0, (l.y2 - camY) | 0);
  ctx.lineTo((l.x2 - camX) | 0, H + 10);
  ctx.closePath();
  ctx.fillStyle = '#d8eaf6';
  ctx.fill();

  // Surface line + ramp markers
  ctx.lineWidth = 2;
  for (let i = 0; i < segments.length; i++) {
    const s  = segments[i];
    const x1 = (s.x1 - camX) | 0, y1 = (s.y1 - camY) | 0;
    const x2 = (s.x2 - camX) | 0, y2 = (s.y2 - camY) | 0;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = s.isRamp ? '#9fc8e8' : '#b4d4ec';
    ctx.lineWidth   = s.isRamp ? 3 : 2;
    ctx.stroke();
    if (s.isRamp) {
      ctx.fillStyle = '#c8a951';
      ctx.font = '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText('▲', (x1 + x2) / 2 | 0, ((y1 + y2) / 2 - 5) | 0);
    }
  }
}

function drawTrees() {
  trees.forEach(tree => {
    const sx = (tree.wx - camX) | 0;
    const sy = (tree.baseY - camY) | 0;
    if (sx < -12 || sx > W + 12) return;
    const h = tree.height;
    // Trunk
    ctx.fillStyle = '#1a2c10';
    ctx.fillRect(sx - 1, sy - h, 2, h);
    // Tiers
    ctx.fillStyle = '#1e4d2b';
    const tiers = tree.tall ? 3 : 2;
    for (let t = 0; t < tiers; t++) {
      const tw = Math.max(2, (h * 0.52 * (tiers - t) / tiers) | 0);
      const ty = (sy - h + h * t / tiers) | 0;
      const th = (h / tiers + 2) | 0;
      ctx.beginPath();
      ctx.moveTo(sx, ty);
      ctx.lineTo(sx - tw, ty + th);
      ctx.lineTo(sx + tw, ty + th);
      ctx.closePath();
      ctx.fill();
    }
    // Snow cap
    ctx.fillStyle = 'rgba(225,242,255,0.72)';
    const cw = Math.max(2, (h * 0.17) | 0);
    ctx.beginPath();
    ctx.moveTo(sx, sy - h - 2);
    ctx.lineTo(sx - cw, sy - h + cw + 1);
    ctx.lineTo(sx + cw, sy - h + cw + 1);
    ctx.closePath();
    ctx.fill();
  });
}

function px(txt, x, y, sz, col, align) {
  ctx.font = sz + 'px monospace';
  ctx.textAlign = align || 'left';
  ctx.fillStyle = col || '#fff';
  ctx.fillText(txt, x | 0, y | 0);
}

function drawHUD() {
  px('SCORE',  5, 10, 6, '#aad4f5');
  px(score,    5, 20, 9, '#fff');
  px('BEST: ' + bestScore, 5, 31, 6, '#c8a951');

  if (comboCount > 1) px('COMBO x' + comboCount, W - 5, 10, 7, '#c8a951', 'right');

  // Air-time overlay
  if (!player.onGround && (spinScored || grabDone || methodDone || airMult > 1)) {
    px(airMult.toFixed(1) + 'x', W - 5, 21, 7, '#ffe066', 'right');
    let parts = [];
    if (spinScored) parts.push(spinScored * 180 + '°');
    if (grabDone)   parts.push('GRAB');
    if (methodDone) parts.push('MTH');
    if (parts.length) px(parts.join('+'), W - 5, 31, 5, 'rgba(255,255,255,0.65)', 'right');
  }

  // Trick flash
  if (trickFlash > 0 && trickName) {
    const a = Math.min(1, trickFlash / 25);
    ctx.globalAlpha = a;
    ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillText(trickName, W / 2 + 1, H / 2 - 27);
    ctx.fillStyle = '#ffe066';
    ctx.fillText(trickName, W / 2, H / 2 - 28);
    ctx.globalAlpha = 1;
    trickFlash--;
  }

  // Mute hint
  ctx.font = '5px monospace'; ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText(muted ? '[M] muted' : '[M] sound', W - 4, H - 4);
}

function drawPlaying() {
  drawBackground();
  drawTerrain();
  drawTrees();

  const sx  = (player.wx - camX) | 0;
  const sy  = (player.wy - camY) | 0;
  const ang = player.onGround
    ? player.angle
    : (player.spinAngle * Math.PI / 180);

  drawRider(sx, sy, ang, player.grabbing, player.method, player.crashed);
  drawHUD();
}

function drawTitle() {
  drawBackground();
  // Ground strip
  ctx.fillStyle = '#c8dff0';
  ctx.fillRect(0, H * 0.72 | 0, W, H);
  // Idle bounce
  const bounce = Math.sin(frameCount * 0.07) * 2 | 0;
  drawRider(W / 2 | 0, (H * 0.72 - 10 + bounce) | 0, 0, false, false, false);

  ctx.fillStyle = 'rgba(6,9,20,0.84)';
  ctx.fillRect(W / 2 - 88, 20, 176, 96);
  ctx.strokeStyle = '#c8a951'; ctx.lineWidth = 1;
  ctx.strokeRect(W / 2 - 88, 20, 176, 96);

  px('POWDER RUN',          W/2, 38,  11, '#c8a951', 'center');
  px('DOWNHILL SNOWBOARDING', W/2, 50, 6,  'rgba(255,255,255,0.5)', 'center');

  if (Math.floor(frameCount / 22) % 2 === 0)
    px('PRESS SPACE TO DROP IN', W/2, 70, 6, '#fff', 'center');

  px('SPACE=Jump  ← →=Spin  ↑=Grab  ↓=Method', W/2, 83, 5, 'rgba(255,255,255,0.42)', 'center');
  px('Release tricks BEFORE landing!',           W/2, 93, 5, '#ff8888', 'center');
  px('TREES = INSTANT WIPEOUT',                  W/2,103, 5, '#ffaa44', 'center');
  px('BEST: ' + bestScore,                       W/2,113, 6, '#c8a951', 'center');

  frameCount++;
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(6,9,20,0.62)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(6,9,20,0.94)';
  ctx.fillRect(W/2 - 82, H/2 - 54, 164, 100);
  ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 82, H/2 - 54, 164, 100);

  px('WIPED OUT',   W/2, H/2 - 38, 11, '#e74c3c', 'center');
  px('SCORE: ' + score,     W/2, H/2 - 19, 8, '#fff',    'center');
  px('BEST:  ' + bestScore, W/2, H/2 -  7, 7, '#c8a951', 'center');
  if (score >= bestScore && score > 0)
    px('★ NEW BEST ★', W/2, H/2 + 7, 7, '#ffe066', 'center');
  if (Math.floor(frameCount / 22) % 2 === 0)
    px('SPACE / R  TO RETRY', W/2, H/2 + 24, 6, '#fff', 'center');

  frameCount++;
}

// ================================================================
// --- GAME LOOP ---
// ================================================================
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTime === null) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (gameState === 'playing') {
    accumulator += dt;
    while (accumulator >= FIXED_DT) { update(); accumulator -= FIXED_DT; }
    drawPlaying();
  } else if (gameState === 'title') {
    drawTitle();
  } else {
    drawPlaying();
    drawGameOver();
    if (keys['KeyR'] || keys['Space']) startGame();
  }
}

// ================================================================
// --- INIT ---
// ================================================================
initTerrain();
initTrees();
requestAnimationFrame(loop);
</script>

</body>
